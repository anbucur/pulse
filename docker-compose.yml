version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pulse-postgres
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse_password_change_in_production
      POSTGRES_DB: pulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pulse-network

  minio:
    image: minio/minio:latest
    container_name: pulse-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_change_in_production
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - pulse-network

  valkey:
    image: valkey/valkey:8.0-alpine
    container_name: pulse-valkey
    command: valkey-server --save 900 1 --save 300 10 --save 60 10000
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pulse-network

  meilisearch:
    image: getmeili/meilisearch:v1.5
    container_name: pulse-meilisearch
    environment:
      MEILI_MASTER_KEY: meilisearch_master_key_change_in_production
      MEILI_ENV: production
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - pulse-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pulse-app
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://pulse:pulse_password_change_in_production@postgres:5432/pulse
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin_change_in_production
      MINIO_BUCKET: pulse
      REDIS_URL: redis://valkey:6379
      MEILISEARCH_ENDPOINT: http://meilisearch:7700
      MEILISEARCH_API_KEY: meilisearch_master_key_change_in_production
      JWT_SECRET: your_jwt_secret_change_in_production
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 30d
      VAPID_PUBLIC_KEY: your_vapid_public_key
      VAPID_PRIVATE_KEY: your_vapid_private_key
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      valkey:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    networks:
      - pulse-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: pulse-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    networks:
      - pulse-network
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  valkey_data:
  meilisearch_data:

networks:
  pulse-network:
    driver: bridge
